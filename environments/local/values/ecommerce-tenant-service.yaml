# Local development values for ecommerce-tenant-service
image:
  repository: ecommerce-tenant-service
  tag: "latest"

ingress:
  enabled: true
  host: ecommerce-tenant-service.127.0.0.1.nip.io

config: |
  logger:
    level: "debug"
    development: true
  mongo:
    host: "mongo"
    database: "tenant"
    replica-set: rs0
  security:
    jwks:
      jwks-url: "http://logto:3001/oidc/jwks"
      audience: "https://api.sokolshop.com"
  kafka:
    brokers: "redpanda:29092"
    schema-registry:
      url: "http://redpanda:8081"
      auto-register-schemas: true
  observability:
    otel-collector-endpoint: "alloy.observability.svc:4317"
    tracing:
      enabled: true
    metrics:
      enabled: false
    profiling:
      enabled: true
      endpoint: "http://alloy.observability.svc:4040"
  logto:
    base-url: "http://logto:3001"
    token-url: "http://logto:3001/oidc/token"
  k8s:
    namespace: "dev"
    cronjob-name: "ecommerce-tenant-service-seeder"

env:
  - name: APP_ENV
    value: "local"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
  - name: LOGTO__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-id
  - name: LOGTO__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-secret

serviceAccount:
  create: true

seederJob:
  enabled: true
  image: ecommerce-seeder:latest
  catalogURL: "http://ecommerce-catalog-service:8080"
  imageURL: "http://ecommerce-image-service:8080"
  logtoURL: "http://logto:3001"
  storageHostOverride: "minio:9000"
