apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dev-cluster
servers: 1
agents: 1
network: "shared-network"

registries:
  create:
    name: dev-registry
    host: "0.0.0.0"
    hostPort: "5000"
  config: |
    configs:
      "registry-1.docker.io":
        tls:
          caFile: "/etc/ssl/certs/corp-ca-bundle.crt"
      "production.cloudfront.docker.com":
        tls:
          caFile: "/etc/ssl/certs/corp-ca-bundle.crt"
      "quay.io":
        tls:
          caFile: "/etc/ssl/certs/corp-ca-bundle.crt"
      "ghcr.io":
        tls:
          caFile: "/etc/ssl/certs/corp-ca-bundle.crt"

volumes:
  - volume: /usr/local/share/ca-certificates:/usr/local/share/ca-certificates
    nodeFilters:
      - all
  - volume: /home/ihsokolo/projects/ecommerce/ecommerce-infrastructure/environments/local/certs/ca-certificates.crt:/etc/ssl/certs/corp-ca-bundle.crt
    nodeFilters:
      - all

ports:
  - port: "80:80"
    nodeFilters:
      - loadbalancer
  - port: "443:443"
    nodeFilters:
      - loadbalancer

options:
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true