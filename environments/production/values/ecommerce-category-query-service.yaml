# Production values for ecommerce-category-query-service
fullnameOverride: ecommerce-category-query-service

image:
  repository: ghcr.io/sokol111/ecommerce-category-query-service
  tag: "0.1.7"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: category-query
    max-pool-size: 20
    write-concern:
      w: "majority"
      journal: true
    read-concern:
      level: "local"
    read-preference:
      mode: "secondaryPreferred"
      max-staleness: 90s
  security:
    jwks:
      jwks-url: "http://logto:3001/oidc/jwks"
      audience: "https://api.sokolshop.com"
    client-credentials:
      token-url: "http://logto:3001/oidc/token"
      resource: "https://api.sokolshop.com"
      scopes:
        - "openid"
        - "tenants:read"
  kafka:
    brokers: "redpanda.prod.svc.cluster.local:9093"
    schema-registry:
      url: "http://redpanda.prod.svc.cluster.local:8081"
      auto-register-schemas: true
    consumers-config:
      default-group-id: "ecommerce-category-query-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "category-events"
          topic: "catalog.category.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
        - name: "attribute-events"
          topic: "catalog.attribute.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
        - name: "tenant-events"
          topic: "tenant.tenant.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
  tenant:
    grpc:
      address: "ecommerce-tenant-service:8080"
  observability:
    otel-collector-endpoint: "alloy.observability.svc.cluster.local:4317"
    tracing:
      enabled: true
    metrics:
      enabled: true
    profiling:
      enabled: true
      endpoint: "http://alloy.observability.svc.cluster.local:4040"

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth (Client Credentials for S2S)
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-id
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-secret
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
