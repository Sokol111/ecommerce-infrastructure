# Production values for ecommerce-admin-ui
fullnameOverride: ecommerce-admin-ui

image:
  repository: ghcr.io/sokol111/ecommerce-admin-ui
  tag: "latest"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  host: admin.sokolshop.com
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "100"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 384Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 4

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: NUXT_CATALOG_API_URL
    value: "http://ecommerce-catalog-service:8080"
  - name: NUXT_IMAGE_API_URL
    value: "http://ecommerce-image-service:8080"
  - name: NUXT_OAUTH_OIDC_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: admin-ui-client-id
  - name: NUXT_OAUTH_OIDC_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: admin-ui-client-secret
  - name: NUXT_OAUTH_OIDC_OPENID_CONFIG_AUTHORIZATION_ENDPOINT
    value: "https://auth.sokolshop.com/oidc/auth"
  - name: NUXT_OAUTH_OIDC_OPENID_CONFIG_TOKEN_ENDPOINT
    value: "http://logto:3001/oidc/token"
  - name: NUXT_OIDC_ISSUER
    value: "https://auth.sokolshop.com/oidc"
  - name: NUXT_OIDC_JWKS_URL
    value: "http://logto:3001/oidc/jwks"
  - name: NUXT_API_RESOURCE_INDICATOR
    value: "https://api.sokolshop.com"
  - name: NUXT_OIDC_LOGOUT_URL
    value: "https://auth.sokolshop.com/oidc/session/end"
  - name: NUXT_OIDC_REVOCATION_URL
    value: "http://logto:3001/oidc/token/revocation"
  - name: NUXT_OAUTH_OIDC_REDIRECT_URL
    value: "https://admin.sokolshop.com/auth/oidc/callback"
  - name: NUXT_OIDC_LOGOUT_REDIRECT_URL
    value: "https://admin.sokolshop.com"
  - name: NUXT_SESSION_PASSWORD
    valueFrom:
      secretKeyRef:
        name: admin-ui-oidc
        key: session-secret
  # API calls go through Nuxt SSR to internal k8s services
  - name: NUXT_SESSION_COOKIE_SECURE
    value: "true"
