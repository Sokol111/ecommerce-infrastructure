# Production values for ecommerce-tenant-service
fullnameOverride: ecommerce-tenant-service

image:
  repository: ghcr.io/sokol111/ecommerce-tenant-service
  tag: "latest"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: tenant
    max-pool-size: 20
    write-concern:
      w: "majority"
      journal: true
    read-concern:
      level: "majority"
  security:
    jwks:
      jwks-url: "http://logto:3001/oidc/jwks"
      audience: "https://api.sokolshop.com"
  logto:
    token-url: "http://logto:3001/oidc/token"
  kafka:
    brokers: "redpanda.prod.svc.cluster.local:9093"
    schema-registry:
      url: "http://redpanda.prod.svc.cluster.local:8081"
      auto-register-schemas: true
  observability:
    otel-collector-endpoint: "alloy.observability.svc.cluster.local:4317"
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth (Logto Management API — client_credentials)
  - name: LOGTO__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-id
  - name: LOGTO__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-secret
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']

seederJob:
  enabled: true
  image: ghcr.io/sokol111/ecommerce-seeder:latest
  catalogURL: "http://ecommerce-catalog-service:8080"
  imageURL: "http://ecommerce-image-service:8080"
  logtoURL: "http://logto:3001"
  apiResource: "https://api.sokolshop.com"
