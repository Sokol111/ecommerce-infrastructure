# Production values for ecommerce-image-service
fullnameOverride: ecommerce-image-service

image:
  repository: ghcr.io/sokol111/ecommerce-image-service
  tag: "0.2.4"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: images
    max-pool-size: 20
    write-concern:
      w: "majority"
      journal: true
    read-concern:
      level: "majority"
  security:
    jwks:
      jwks-url: "http://logto:3001/oidc/jwks"
      audience: "https://api.sokolshop.com"
    client-credentials:
      token-url: "http://logto:3001/oidc/token"
      resource: "https://api.sokolshop.com"
      scopes:
        - "openid"
        - "tenants:read"
  kafka:
    brokers: "redpanda.prod.svc.cluster.local:9093"
    consumers-config:
      default-group-id: "ecommerce-image-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "catalog-events"
          topic: "catalog.product.events"
        - name: "tenant-events"
          topic: "tenant.tenant.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
  application:
    max-upload-bytes: 5242880
    small-width: 400
    large-width: 800
    quality: 85
  s3:
    endpoint: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
    public-endpoint: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
    bucket: "images"
    use-path-style: true
    region: "auto"
    presign-ttl: 15m
  imgproxy:
    public-base-url: "https://img.sokolshop.com"
    bucket: "images"
  tenant:
    grpc:
      address: "ecommerce-tenant-service:8080"
  observability:
    otel-collector-endpoint: "alloy.observability.svc.cluster.local:4317"
    tracing:
      enabled: true
    metrics:
      enabled: true
    profiling:
      enabled: true
      endpoint: "http://alloy.observability.svc.cluster.local:4040"

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth (Client Credentials for S2S)
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-id
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-secret
  # Application
  - name: UPLOAD_TOKEN__JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: image-service-secrets
        key: jwt-secret
  # S3 (Cloudflare R2)
  - name: S3__ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: access-key-id
  - name: S3__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: secret-key
  # imgproxy
  - name: IMGPROXY__KEY_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: key
  - name: IMGPROXY__SALT_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: salt
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
