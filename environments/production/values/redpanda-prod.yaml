# Redpanda (Kafka-compatible) - Production values for single-node k3s
# Chart: redpanda/redpanda from https://charts.redpanda.com
statefulset:
  replicas: 1

resources:
  cpu:
    cores: 1
  memory:
    container:
      max: 1Gi
    redpanda:
      memory: 512Mi
      reserveMemory: 128Mi

storage:
  persistentVolume:
    enabled: true
    size: 5Gi

listeners:
  kafka:
    port: 9093
  schemaRegistry:
    enabled: true
    port: 8081

console:
  enabled: false

tls:
  enabled: false

tuning:
  tune_aio_events: false

logging:
  logLevel: warn

monitoring:
  enabled: false

external:
  enabled: false

auth:
  sasl:
    enabled: false
