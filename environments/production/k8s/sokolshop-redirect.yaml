# Redirect sokolshop.com -> platform.sokolshop.com/register
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-platform
  namespace: prod
spec:
  redirectRegex:
    regex: "^https://sokolshop\\.com(.*)"
    replacement: "https://platform.sokolshop.com/register"
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sokolshop-redirect
  namespace: prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "200"
    traefik.ingress.kubernetes.io/router.middlewares: prod-redirect-to-platform@kubernetescrd
spec:
  rules:
    - host: sokolshop.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: imgproxy
                port:
                  number: 8080
