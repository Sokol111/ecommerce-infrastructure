# k3s Traefik customization via HelmChartConfig
# SSL handled by Cloudflare (Proxy ON + Origin Certificate)
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
    tlsStore:
      default:
        defaultCertificate:
          secretName: cloudflare-origin-tls
    ingressClass:
      enabled: true
      isDefaultClass: true
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 128Mi
