apiVersion: v1
kind: ServiceAccount
metadata:
  name: logto-seed
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: logto-seed
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logto-seed
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: logto-seed
    namespace: prod
roleRef:
  kind: Role
  name: logto-seed
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logto-seed-
  namespace: prod
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: logto-seed
      restartPolicy: Never
      containers:
        - name: logto-seed
          image: ${IMAGE}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: DB_URL
              value: "postgresql://logto:$(DB_PASSWORD)@postgres:5432/logto"
            - name: LOGTO_URL
              value: "http://logto:3001"
            - name: API_RESOURCE_INDICATOR
              value: "https://api.sokolshop.com"
            - name: ADMIN_UI_REDIRECT_URI
              value: "https://admin.sokolshop.com/auth/oidc/callback"
            - name: ADMIN_UI_LOGOUT_URI
              value: "https://admin.sokolshop.com"
            - name: KUBE_NAMESPACE
              value: "prod"
            - name: KUBE_SECRET_NAME
              value: "logto-credentials"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
