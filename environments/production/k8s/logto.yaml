# Logto OIDC Identity Provider — Deployment + Service + Ingress for k3s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logto
  namespace: prod
  labels:
    app.kubernetes.io/name: logto
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logto
    spec:
      containers:
        - name: logto
          image: svhd/logto:latest
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            - name: admin
              containerPort: 3002
              protocol: TCP
          env:
            - name: TRUST_PROXY_HEADER
              value: "1"
            - name: ENDPOINT
              value: "https://auth.sokolshop.com"
            - name: ADMIN_ENDPOINT
              value: "http://localhost:3002"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: logto-db
                  key: connection-string
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /oidc/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /oidc/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: logto
  namespace: prod
  labels:
    app.kubernetes.io/name: logto
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
    - port: 3002
      targetPort: admin
      protocol: TCP
      name: admin
  selector:
    app.kubernetes.io/name: logto
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logto
  namespace: prod
  labels:
    app.kubernetes.io/name: logto
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: auth.sokolshop.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: logto
                port:
                  number: 3001
