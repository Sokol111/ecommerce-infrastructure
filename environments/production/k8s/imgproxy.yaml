# imgproxy Deployment + Service + Ingress for k3s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgproxy
  namespace: prod
  labels:
    app.kubernetes.io/name: imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imgproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imgproxy
    spec:
      containers:
        - name: imgproxy
          image: darthsim/imgproxy:v3.30
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # S3 (Cloudflare R2)
            - name: IMGPROXY_USE_S3
              value: "true"
            - name: IMGPROXY_S3_REGION
              value: "auto"
            - name: IMGPROXY_S3_ENDPOINT
              value: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: secret-key
            # Security
            - name: IMGPROXY_KEY
              valueFrom:
                secretKeyRef:
                  name: imgproxy-keys
                  key: key
            - name: IMGPROXY_SALT
              valueFrom:
                secretKeyRef:
                  name: imgproxy-keys
                  key: salt
            # Features
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
            - name: IMGPROXY_ENABLE_AVIF_DETECTION
              value: "true"
            # Caching
            - name: IMGPROXY_TTL
              value: "2592000"
            # Performance
            - name: IMGPROXY_MAX_SRC_RESOLUTION
              value: "50.0"
            - name: IMGPROXY_CONCURRENCY
              value: "50"
            - name: IMGPROXY_MAX_CLIENTS
              value: "250"
            # Logging
            - name: IMGPROXY_LOG_LEVEL
              value: "warn"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: imgproxy
  namespace: prod
  labels:
    app.kubernetes.io/name: imgproxy
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: imgproxy
---
# Traefik Middleware to strip /img prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: imgproxy-strip-prefix
  namespace: prod
spec:
  stripPrefix:
    prefixes:
      - /img
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: imgproxy
  namespace: prod
  labels:
    app.kubernetes.io/name: imgproxy
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: prod-imgproxy-strip-prefix@kubernetescrd
spec:
  rules:
    - host: sokolshop.com
      http:
        paths:
          - path: /img
            pathType: Prefix
            backend:
              service:
                name: imgproxy
                port:
                  number: 8080
