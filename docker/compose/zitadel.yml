    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - zitadel-secrets:/output
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy
      actions-webhook:
        condition: service_started
    restart: "no"

  actions-webhook:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.actions-webhook
    container_name: actions-webhook
    networks:
      - zitadel
    restart: unless-stopped

networks:
  zitadel:
    name: zitadel
  shared-network:
    external: true

volumes:
  zitadel-db-data:
  zitadel-bootstrap:
  zitadel-secrets:
