name: Release Seeder Image

on:
  push:
    branches: [main]
    paths:
      - "cmd/seeder/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        id: meta
        run: |
          IMAGE=ghcr.io/sokol111/ecommerce-seeder
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: cmd/seeder
          file: docker/Dockerfile.seeder
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:latest
