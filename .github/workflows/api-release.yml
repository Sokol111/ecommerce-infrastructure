name: API Release

on:
  workflow_call:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tools
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      # ============================================
      # EXTRACT VERSION & VALIDATE
      # ============================================
      - name: Extract version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n' | tr -d '\r')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: v$VERSION"

      - name: Check if tag exists
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "❌ Tag ${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Install proto tools
        run: make connect-install-tools

      - name: Verify generated code is up to date
        run: |
          make generate
          if ! git diff --exit-code gen/; then
            echo "❌ Generated code is out of date. Run: make generate"
            exit 1
          fi

      # ============================================
      # PUBLISH NPM PACKAGE
      # ============================================
      - name: Publish to GitHub Packages
        working-directory: gen/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # CREATE RELEASE
      # ============================================
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
