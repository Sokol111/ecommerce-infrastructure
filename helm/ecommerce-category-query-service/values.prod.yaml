# Production values for ecommerce-category-query-service
image:
  repository: ghcr.io/sokol111/ecommerce-category-query-service
  tag: "0.1.4"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  mongo:
    database: category-query
    max-pool-size: 20
  kafka:
    schema-registry:
      auto-register-schemas: true
    consumers-config:
      default-group-id: "ecommerce-category-query-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "category-events"
          topic: "catalog.category.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
        - name: "attribute-events"
          topic: "catalog.attribute.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth
  - name: SECURITY__TOKEN__PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  # Kafka (Redpanda)
  - name: KAFKA__BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA__SCHEMA_REGISTRY_URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # Observability
  - name: OBSERVABILITY__OTEL_COLLECTOR_ENDPOINT
    value: "http://alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
