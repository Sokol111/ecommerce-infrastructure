# Production values for ecommerce-ui
fullnameOverride: ecommerce-ui

image:
  repository: ghcr.io/sokol111/ecommerce-ui
  tag: "0.1.2"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  host: sokolshop.com
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 2

env:
  - name: NUXT_CATEGORY_QUERY_API_URL
    value: "http://ecommerce-category-query-service:8080"
  - name: NUXT_PRODUCT_QUERY_API_URL
    value: "http://ecommerce-product-query-service:8080"
  # API calls go through Nuxt SSR to internal k8s services
  - name: NUXT_PUBLIC_IMGPROXY_URL
    value: "https://sokolshop.com/img"
