# Production values for ecommerce-auth-service
image:
  repository: ghcr.io/sokol111/ecommerce-auth-service
  tag: "0.1.0"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  - name: CONFIG_FILE
    value: "/configs/config.pro.yaml"
  # MongoDB Atlas
  - name: MONGO_HOST
    value: "cluster0.xxxxx.mongodb.net" # CHANGE_ME
  - name: MONGO_PORT
    value: "27017"
  - name: MONGO_USERNAME
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: username
  - name: MONGO_PASSWORD
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: password
  # Auth keys
  - name: SECURITY_TOKEN_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  - name: TOKEN_PRIVATE_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: private-key
  # Admin bootstrap
  - name: ADMIN_INITIAL_USER_EMAIL
    valueFrom:
      secretKeyRef:
        name: admin-credentials
        key: email
  - name: ADMIN_INITIAL_USER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: admin-credentials
        key: password
  # Observability
  - name: OBSERVABILITY_OTEL_COLLECTOR_ENDPOINT
    value: "http://alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
