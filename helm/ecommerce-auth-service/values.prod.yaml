# Production values for ecommerce-auth-service
image:
  repository: ghcr.io/sokol111/ecommerce-auth-service
  tag: "0.1.1"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  mongo:
    database: auth
    max-pool-size: 20
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true
  token:
    access-token-duration: 15m
    refresh-token-duration: 168h
  rate-limit:
    login-tokens: 5
    login-interval: 1m
  admin:
    initial-user:
      enabled: true
      first-name: Super
      last-name: Admin
  permissions:
    roles:
      - name: super_admin
        description: Full access to all resources
        permissions:
          - "users:read"
          - "users:write"
          - "users:delete"
          - "products:read"
          - "products:write"
          - "products:delete"
          - "categories:read"
          - "categories:write"
          - "categories:delete"
          - "attributes:read"
          - "attributes:write"
          - "attributes:delete"
      - name: catalog_manager
        description: Can manage products, categories and attributes
        permissions:
          - "products:read"
          - "products:write"
          - "products:delete"
          - "categories:read"
          - "categories:write"
          - "categories:delete"
          - "attributes:read"
          - "attributes:write"
          - "attributes:delete"
      - name: viewer
        description: Read-only access
        permissions:
          - "users:read"
          - "products:read"
          - "categories:read"
          - "attributes:read"

env:
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO_CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth keys
  - name: SECURITY_TOKEN_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  - name: TOKEN_PRIVATE_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: private-key
  # Admin bootstrap
  - name: ADMIN_INITIAL_USER_EMAIL
    valueFrom:
      secretKeyRef:
        name: admin-credentials
        key: email
  - name: ADMIN_INITIAL_USER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: admin-credentials
        key: password
  # Observability
  - name: OBSERVABILITY_OTEL_COLLECTOR_ENDPOINT
    value: "http://alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
