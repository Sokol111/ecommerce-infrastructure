# Local development values for ecommerce-admin-ui
image:
  repository: ecommerce-admin-ui
  tag: "latest"

ingress:
  enabled: true
  host: admin.127.0.0.1.nip.io

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 2

env:
  - name: NUXT_CATALOG_API_URL
    value: "http://ecommerce-catalog-service:8080"
  - name: NUXT_IMAGE_API_URL
    value: "http://ecommerce-image-service:8080"
  - name: NUXT_OIDC_PROVIDERS_OIDC_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: zitadel-credentials
        key: admin-ui-client-id
  - name: NUXT_OIDC_PROVIDERS_OIDC_AUTHORIZATION_URL
    value: "http://localhost:8080/oauth/v2/authorize"
  - name: NUXT_OIDC_PROVIDERS_OIDC_TOKEN_URL
    value: "http://zitadel-api:8080/oauth/v2/token"
  - name: NUXT_OIDC_PROVIDERS_OIDC_USERINFO_URL
    value: "http://zitadel-api:8080/oidc/v1/userinfo"
  - name: NUXT_OIDC_PROVIDERS_OIDC_LOGOUT_URL
    value: "http://localhost:8080/oidc/v1/end_session"
  - name: NUXT_OIDC_PROVIDERS_OIDC_REDIRECT_URI
    value: "http://admin.127.0.0.1.nip.io/auth/oidc/callback"
  - name: NUXT_OIDC_PROVIDERS_OIDC_LOGOUT_REDIRECT_URI
    value: "http://admin.127.0.0.1.nip.io"
  - name: NUXT_OIDC_SESSION_SECRET
    value: "dev-session-secret-that-is-at-least-48-characters-long"
  - name: NUXT_OIDC_AUTH_SESSION_SECRET
    value: "dev-auth-session-secret-at-least-48-characters-long!"
  - name: NUXT_OIDC_TOKEN_KEY
    value: "data:;base64,yP5FfEi11aWdtRINAxBxwaIFjjm8/ATEQjoJKsQ5cvY="
  - name: NUXT_COOKIE_SECURE
    value: "false"
