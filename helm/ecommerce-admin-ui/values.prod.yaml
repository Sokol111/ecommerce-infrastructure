# Production values for ecommerce-admin-ui
image:
  repository: ghcr.io/sokol111/ecommerce-admin-ui
  tag: "0.1.0"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  host: admin.sokolshop.com
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 2

env:
  - name: NUXT_CATALOG_API_URL
    value: "http://ecommerce-catalog-service:8080"
  - name: NUXT_IMAGE_API_URL
    value: "http://ecommerce-image-service:8080"
  - name: NUXT_AUTH_API_URL
    value: "http://ecommerce-auth-service:8080"
  # API calls go through Nuxt SSR to internal k8s services
  - name: NUXT_PUBLIC_IMGPROXY_URL
    value: "https://sokolshop.com/img"
  - name: NUXT_COOKIE_SECURE
    value: "true"
