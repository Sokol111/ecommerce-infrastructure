# Production values for ecommerce-admin-ui
fullnameOverride: ecommerce-admin-ui

image:
  repository: ghcr.io/sokol111/ecommerce-admin-ui
  tag: "0.1.5"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  host: admin.sokolshop.com
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 384Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 4

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: NUXT_CATALOG_API_URL
    value: "http://ecommerce-catalog-service:8080"
  - name: NUXT_IMAGE_API_URL
    value: "http://ecommerce-image-service:8080"
  - name: NUXT_OIDC_PROVIDERS_ZITADEL_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: zitadel-s2s
        key: client-id
  - name: NUXT_OIDC_PROVIDERS_ZITADEL_BASE_URL
    value: "https://auth.sokolshop.com"
  - name: NUXT_OIDC_PROVIDERS_ZITADEL_REDIRECT_URI
    value: "https://admin.sokolshop.com/auth/zitadel/callback"
  - name: NUXT_OIDC_PROVIDERS_ZITADEL_LOGOUT_REDIRECT_URI
    value: "https://admin.sokolshop.com"
  - name: NUXT_OIDC_PROVIDERS_ZITADEL_AUDIENCE
    valueFrom:
      secretKeyRef:
        name: zitadel-s2s
        key: client-id
  - name: NUXT_OIDC_SESSION_SECRET
    valueFrom:
      secretKeyRef:
        name: admin-ui-oidc
        key: session-secret
  - name: NUXT_OIDC_AUTH_SESSION_SECRET
    valueFrom:
      secretKeyRef:
        name: admin-ui-oidc
        key: auth-session-secret
  # API calls go through Nuxt SSR to internal k8s services
  - name: NUXT_PUBLIC_IMGPROXY_URL
    value: "https://sokolshop.com/img"
  - name: NUXT_COOKIE_SECURE
    value: "true"
