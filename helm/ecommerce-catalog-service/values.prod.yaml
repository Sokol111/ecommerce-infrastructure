# Production values for ecommerce-catalog-service
fullnameOverride: ecommerce-catalog-service

image:
  repository: ghcr.io/sokol111/ecommerce-catalog-service
  tag: "0.1.8"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: catalog
    max-pool-size: 20
    write-concern:
      w: "majority"
      journal: true
    read-concern:
      level: "majority"
  kafka:
    schema-registry:
      auto-register-schemas: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth (Logto JWKS)
  - name: SECURITY__JWKS__JWKS_URL
    value: "http://logto:3001/oidc/jwks"
  - name: SECURITY__JWKS__AUDIENCE
    value: "https://api.sokolshop.com"
  # Auth (Client Credentials for S2S)
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-id
  - name: SECURITY__CLIENT_CREDENTIALS__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: ecommerce-m2m-client-secret
  - name: SECURITY__CLIENT_CREDENTIALS__TOKEN_URL
    value: "http://logto:3001/oidc/token"
  - name: SECURITY__CLIENT_CREDENTIALS__RESOURCE
    value: "https://api.sokolshop.com"
  # Kafka (Redpanda)
  - name: KAFKA__BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA__SCHEMA_REGISTRY__URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # Observability
  - name: OBSERVABILITY__OTEL_COLLECTOR_ENDPOINT
    value: "alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
