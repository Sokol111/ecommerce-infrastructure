# Production values for ecommerce-image-service
fullnameOverride: ecommerce-image-service

image:
  repository: ghcr.io/sokol111/ecommerce-image-service
  tag: "0.2.4"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: images
    max-pool-size: 20
  kafka:
    schema-registry:
      auto-register-schemas: true
    consumers-config:
      default-group-id: "ecommerce-image-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "catalog-events"
          topic: "catalog.product.events"
  application:
    presign-ttl: 15m
    max-upload-bytes: 5242880
    promote:
      small-width: 400
      large-width: 800
      quality: 85
  s3:
    use-path-style: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth
  - name: SECURITY__TOKEN__PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  - name: SECURITY__TOKEN__SERVICE_TOKEN
    valueFrom:
      secretKeyRef:
        name: image-service-token
        key: service-token
  # Application
  - name: APPLICATION__JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: image-service-secrets
        key: jwt-secret
  # Kafka (Redpanda)
  - name: KAFKA__BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA__SCHEMA_REGISTRY__URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # S3 (Cloudflare R2)
  - name: S3__ENDPOINT
    value: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
  - name: S3__PUBLIC_ENDPOINT
    value: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
  - name: S3__ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: access-key-id
  - name: S3__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: secret-key
  - name: S3__BUCKET
    value: "images"
  - name: S3__REGION
    value: "auto"
  # imgproxy
  - name: IMGPROXY__PUBLIC_BASE_URL
    value: "https://sokolshop.com/img"
  - name: IMGPROXY__KEY_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: key
  - name: IMGPROXY__SALT_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: salt
  # Observability
  - name: OBSERVABILITY__OTEL_COLLECTOR_ENDPOINT
    value: "alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
