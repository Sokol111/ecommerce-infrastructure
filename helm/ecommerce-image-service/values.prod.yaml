# Production values for ecommerce-image-service
image:
  repository: ghcr.io/sokol111/ecommerce-image-service
  tag: "0.1.0"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

config: |
  mongo:
    database: images
    max-pool-size: 20
  kafka:
    schema-registry:
      auto-register-schemas: true
    consumers-config:
      default-group-id: "ecommerce-image-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "catalog-events"
          topic: "catalog.product.events"
  application:
    presign-ttl: 15m
    max-upload-bytes: 5242880
    promote:
      small-width: 400
      large-width: 800
      quality: 85
  s3:
    use-path-style: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  # MongoDB Atlas (SRV connection string: mongodb+srv://user:pass@cluster0.ewnbawt.mongodb.net/images?appName=Cluster0)
  - name: MONGO_CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth
  - name: SECURITY_TOKEN_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  # Application
  - name: APPLICATION_JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: image-service-secrets
        key: jwt-secret
  # Kafka (Redpanda)
  - name: KAFKA_BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA_SCHEMA_REGISTRY_URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # S3 (Cloudflare R2)
  - name: S3_ENDPOINT
    value: "https://5f0b37ed80145a53c4fbecedb6474a95.r2.cloudflarestorage.com"
  - name: S3_PUBLIC_ENDPOINT
    value: "https://sokolshop.com/img"
  - name: S3_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: access-key-id
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: r2-credentials
        key: secret-key
  - name: S3_BUCKET
    value: "products"
  - name: S3_REGION
    value: "auto"
  # imgproxy
  - name: IMGPROXY_PUBLIC_BASE_URL
    value: "https://sokolshop.com/img"
  - name: IMGPROXY_KEY_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: key
  - name: IMGPROXY_SALT_HEX
    valueFrom:
      secretKeyRef:
        name: imgproxy-keys
        key: salt
  # Observability
  - name: OBSERVABILITY_OTEL_COLLECTOR_ENDPOINT
    value: "http://alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
