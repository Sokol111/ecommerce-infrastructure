# Debug configuration for ecommerce-product-query-service
# Usage: skaffold dev or helm upgrade -f values.local.yaml -f values.debug.yaml

debugPort: 2345
command: ["/bin/sh"]
args:
  - "-c"
  - |
    /dlv exec /server \
      --listen=:2345 \
      --headless=true \
      --api-version=2 \
      --accept-multiclient \
      --continue &
    DLV_PID=$!
    # Wait for dlv to start and spawn the Go process
    sleep 2
    # Monitor: if Go process (/server) dies, kill dlv and exit
    while kill -0 $DLV_PID 2>/dev/null; do
      # Check if /server process exists (child of dlv)
      if ! pgrep -x server > /dev/null 2>&1; then
        sleep 3
        # Double-check after short delay
        if ! pgrep -x server > /dev/null 2>&1; then
          echo "Go process exited, terminating dlv"
          kill $DLV_PID 2>/dev/null
          exit 1
        fi
      fi
      sleep 2
    done
    wait $DLV_PID

# Startup probe з великим таймаутом для початкового запуску
startupProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 60  # 60 * 5s = 5 хвилин на старт

# Liveness з великим timeout щоб не вбивало на breakpoint
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 15  # 15 * 60s = 15 хвилин на breakpoint

# Вимикаємо readiness в дебазі
readinessProbe: {}
