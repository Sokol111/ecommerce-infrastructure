# Production values for ecommerce-product-query-service
image:
  repository: ghcr.io/sokol111/ecommerce-product-query-service
  tag: "0.1.2"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

config: |
  mongo:
    database: product-query
    max-pool-size: 20
  kafka:
    schema-registry:
      auto-register-schemas: true
    consumers-config:
      default-group-id: "ecommerce-product-query-service"
      default-auto-offset-reset: "earliest"
      consumers:
        - name: "catalog-events"
          topic: "catalog.product.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
        - name: "catalog-attribute-events"
          topic: "catalog.attribute.events"
          max-retries: 5
          initial-backoff: 2s
          max-backoff: 30s
          enable-dlq: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO_CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth
  - name: SECURITY_TOKEN_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: auth-keys
        key: public-key
  # Kafka (Redpanda)
  - name: KAFKA_BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA_SCHEMA_REGISTRY_URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # Observability
  - name: OBSERVABILITY_OTEL_COLLECTOR_ENDPOINT
    value: "http://alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
