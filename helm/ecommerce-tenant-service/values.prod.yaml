# Production values for ecommerce-tenant-service
fullnameOverride: ecommerce-tenant-service

image:
  repository: ghcr.io/sokol111/ecommerce-tenant-service
  tag: "latest"
  pullPolicy: IfNotPresent

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config: |
  logger:
    level: "debug"
  mongo:
    database: tenant
    max-pool-size: 20
  kafka:
    schema-registry:
      auto-register-schemas: true
  observability:
    tracing:
      enabled: true
    metrics:
      enabled: true

env:
  - name: APP_ENV
    value: "production"
  - name: CONFIG_FILE
    value: "/configs/config.yaml"
  - name: MONGO__CONNECTION_STRING
    valueFrom:
      secretKeyRef:
        name: mongodb-credentials
        key: connection-string
  # Auth (Logto JWKS)
  - name: SECURITY__JWKS__JWKS_URL
    value: "http://logto:3001/oidc/jwks"
  - name: SECURITY__JWKS__AUDIENCE
    value: "https://api.sokolshop.com"
  # Auth (Logto Management API — client_credentials)
  - name: LOGTO__CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-id
  - name: LOGTO__TOKEN_URL
    value: "http://logto:3001/oidc/token"
  - name: LOGTO__CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: logto-credentials
        key: tenant-m2m-client-secret
  # Kafka (Redpanda)
  - name: KAFKA__BROKERS
    value: "redpanda.prod.svc.cluster.local:9093"
  - name: KAFKA__SCHEMA_REGISTRY__URL
    value: "http://redpanda.prod.svc.cluster.local:8081"
  # Observability
  - name: OBSERVABILITY__OTEL_COLLECTOR_ENDPOINT
    value: "alloy.observability.svc.cluster.local:4317"
  - name: APP_SERVICE_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/name']
  - name: APP_SERVICE_VERSION
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app.kubernetes.io/version']
