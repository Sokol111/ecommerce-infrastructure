{{- if .Values.seederJob.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "template.fullname" . }}-job-creator
  labels:
    {{- include "template.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "template.fullname" . }}-job-creator
  labels:
    {{- include "template.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "template.fullname" . }}-job-creator
subjects:
  - kind: ServiceAccount
    name: {{ include "template.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
