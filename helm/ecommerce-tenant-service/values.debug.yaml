# Debug configuration for ecommerce-tenant-service
debugPort: 2345
command: ["/bin/sh"]
args:
  - "-c"
  - |
    /dlv exec /server \
      --listen=:2345 \
      --headless=true \
      --api-version=2 \
      --accept-multiclient \
      --continue &
    DLV_PID=$!
    sleep 2
    while kill -0 $DLV_PID 2>/dev/null; do
      if ! pgrep -x server > /dev/null 2>&1; then
        sleep 3
        if ! pgrep -x server > /dev/null 2>&1; then
          echo "Go process exited, terminating dlv"
          kill $DLV_PID 2>/dev/null
          exit 1
        fi
      fi
      sleep 2
    done
    wait $DLV_PID

startupProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 60

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 15

readinessProbe: {}
